apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: delivery-db-pvc
  namespace: delivereats
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard-rwo
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: delivery-db
  namespace: delivereats
spec:
  serviceName: delivery-db-service
  replicas: 1
  selector:
    matchLabels:
      app: delivery-db
  template:
    metadata:
      labels:
        app: delivery-db
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306
          name: mysql
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: MYSQL_ROOT_PASSWORD
        - name: MYSQL_DATABASE
          value: delivery_db
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: MYSQL_USER
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: MYSQL_PASSWORD
        volumeMounts:
        - name: delivery-db-storage
          mountPath: /var/lib/mysql
        - name: init-scripts
          mountPath: /docker-entrypoint-initdb.d
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      volumes:
      - name: delivery-db-storage
        persistentVolumeClaim:
          claimName: delivery-db-pvc
      - name: init-scripts
        configMap:
          name: delivery-db-init-script
---
apiVersion: v1
kind: Service
metadata:
  name: delivery-db-service
  namespace: delivereats
spec:
  selector:
    app: delivery-db
  ports:
  - protocol: TCP
    port: 3306
    targetPort: 3306
  clusterIP: None
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: delivery-db-init-script
  namespace: delivereats
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS deliveries (
      id INT AUTO_INCREMENT PRIMARY KEY,
      order_id INT NOT NULL UNIQUE,
      delivery_person_id INT,
      status ENUM('pending', 'assigned', 'picked_up', 'in_transit', 'delivered', 'failed') NOT NULL DEFAULT 'pending',
      pickup_address TEXT NOT NULL,
      delivery_address TEXT NOT NULL,
      estimated_time INT,
      actual_delivery_time TIMESTAMP NULL,
      notes TEXT,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
      INDEX idx_order_id (order_id),
      INDEX idx_delivery_person_id (delivery_person_id),
      INDEX idx_status (status)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;
