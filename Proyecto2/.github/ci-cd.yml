name: DeliverEats CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_CLUSTER_NAME: delivereats-cluster
  GKE_ZONE: us-central1-a
  REGISTRY: gcr.io

jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 1. LINT & CODE QUALITY
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - catalog-service
          - orders-service
          - delivery-service
          - notification-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: ./${{ matrix.service }}
        run: npm ci

      - name: Run ESLint
        working-directory: ./${{ matrix.service }}
        run: npm run lint || true

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 2. UNIT TESTS
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - catalog-service
          - orders-service
          - delivery-service
          - notification-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: ./${{ matrix.service }}
        run: npm ci

      - name: Run tests
        working-directory: ./${{ matrix.service }}
        run: npm test || echo "No tests configured"
        env:
          NODE_ENV: test

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 3. SECURITY SCAN
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - catalog-service
          - orders-service
          - delivery-service
          - notification-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run npm audit
        working-directory: ./${{ matrix.service }}
        run: npm audit --audit-level=high || true

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 4. BUILD DOCKER IMAGES
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v'))
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - catalog-service
          - orders-service
          - delivery-service
          - notification-service
          - frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      - name: Extract version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          elif [[ $GITHUB_REF == refs/heads/main ]]; then
            echo "VERSION=latest" >> $GITHUB_OUTPUT
          else
            echo "VERSION=develop-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ matrix.service }}:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 5. INTEGRATION TESTS (Optional - against staging)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run integration tests
        run: |
          echo "Running integration tests against staging environment"
          # npm run test:integration

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 6. DEPLOY TO DEVELOPMENT
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: development
      url: https://dev.delivereats.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER_NAME }}
          location: ${{ env.GKE_ZONE }}

      - name: Deploy to Kubernetes (Development)
        run: |
          kubectl set image deployment/api-gateway api-gateway=${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/api-gateway:develop-${GITHUB_SHA::8} -n delivereats
          kubectl set image deployment/auth-service auth-service=${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/auth-service:develop-${GITHUB_SHA::8} -n delivereats
          kubectl set image deployment/catalog-service catalog-service=${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/catalog-service:develop-${GITHUB_SHA::8} -n delivereats
          kubectl set image deployment/orders-service orders-service=${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/orders-service:develop-${GITHUB_SHA::8} -n delivereats
          kubectl set image deployment/delivery-service delivery-service=${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/delivery-service:develop-${GITHUB_SHA::8} -n delivereats
          kubectl set image deployment/notification-service notification-service=${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/notification-service:develop-${GITHUB_SHA::8} -n delivereats
          kubectl set image deployment/frontend frontend=${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/frontend:develop-${GITHUB_SHA::8} -n delivereats

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/api-gateway -n delivereats --timeout=5m
          kubectl rollout status deployment/orders-service -n delivereats --timeout=5m
          kubectl rollout status deployment/catalog-service -n delivereats --timeout=5m

      - name: Verify deployment
        run: |
          kubectl get pods -n delivereats
          kubectl get services -n delivereats

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 7. DEPLOY TO PRODUCTION (Requires manual approval + tag)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://delivereats.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER_NAME }}
          location: ${{ env.GKE_ZONE }}

      - name: Extract version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=latest" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Kubernetes (Production) - Rolling Update
        run: |
          kubectl set image deployment/api-gateway api-gateway=${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/api-gateway:${{ steps.version.outputs.VERSION }} -n delivereats
          kubectl set image deployment/auth-service auth-service=${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/auth-service:${{ steps.version.outputs.VERSION }} -n delivereats
          kubectl set image deployment/catalog-service catalog-service=${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/catalog-service:${{ steps.version.outputs.VERSION }} -n delivereats
          kubectl set image deployment/orders-service orders-service=${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/orders-service:${{ steps.version.outputs.VERSION }} -n delivereats
          kubectl set image deployment/delivery-service delivery-service=${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/delivery-service:${{ steps.version.outputs.VERSION }} -n delivereats
          kubectl set image deployment/notification-service notification-service=${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/notification-service:${{ steps.version.outputs.VERSION }} -n delivereats
          kubectl set image deployment/frontend frontend=${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/frontend:${{ steps.version.outputs.VERSION }} -n delivereats

      - name: Wait for rollout completion
        run: |
          kubectl rollout status deployment/api-gateway -n delivereats --timeout=10m
          kubectl rollout status deployment/auth-service -n delivereats --timeout=10m
          kubectl rollout status deployment/catalog-service -n delivereats --timeout=10m
          kubectl rollout status deployment/orders-service -n delivereats --timeout=10m
          kubectl rollout status deployment/delivery-service -n delivereats --timeout=10m
          kubectl rollout status deployment/notification-service -n delivereats --timeout=10m
          kubectl rollout status deployment/frontend -n delivereats --timeout=10m

      - name: Verify production deployment
        run: |
          echo "=== PODS STATUS ==="
          kubectl get pods -n delivereats
          echo ""
          echo "=== SERVICES STATUS ==="
          kubectl get services -n delivereats
          echo ""
          echo "=== INGRESS STATUS ==="
          kubectl get ingress -n delivereats

      - name: Slack Notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Production deployment ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 8. ROLLBACK (Manual trigger only)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER_NAME }}
          location: ${{ env.GKE_ZONE }}

      - name: Rollback all deployments
        run: |
          kubectl rollout undo deployment/api-gateway -n delivereats
          kubectl rollout undo deployment/auth-service -n delivereats
          kubectl rollout undo deployment/catalog-service -n delivereats
          kubectl rollout undo deployment/orders-service -n delivereats
          kubectl rollout undo deployment/delivery-service -n delivereats
          kubectl rollout undo deployment/notification-service -n delivereats
          kubectl rollout undo deployment/frontend -n delivereats

      - name: Wait for rollback completion
        run: |
          kubectl rollout status deployment/api-gateway -n delivereats --timeout=10m
          kubectl rollout status deployment/orders-service -n delivereats --timeout=10m

      - name: Verify rollback
        run: kubectl get pods -n delivereats
