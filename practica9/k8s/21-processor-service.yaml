apiVersion: apps/v1
kind: Deployment
metadata:
  name: tickets-service
  namespace: practica9
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tickets-service
  template:
    metadata:
      labels:
        app: tickets-service
    spec:
      containers:
        - name: tickets-service
          image: us-central1-docker.pkg.dev/saproject201807411/delivereats/p8-tickets-service:latest
          imagePullPolicy: Always
          env:
            - name: PORT
              value: "3102"
            - name: DB_HOST
              value: tickets-db
            - name: DB_PORT
              value: "3306"
            - name: DB_USER
              value: root
            - name: DB_PASSWORD
              value: password
            - name: DB_NAME
              value: tickets_db
            - name: USERS_SERVICE_URL
              value: http://users-service:3101
            - name: EVENT_BUS_URL
              value: amqp://helpdesk:helpdesk123@rabbitmq:5672
            - name: EVENT_EXCHANGE
              value: helpdesk.events
            - name: EVENT_BUS_ENABLED
              value: "true"
          ports:
            - containerPort: 3102
---
apiVersion: v1
kind: Service
metadata:
  name: tickets-service
  namespace: practica9
spec:
  selector:
    app: tickets-service
  ports:
    - port: 3102
      targetPort: 3102
