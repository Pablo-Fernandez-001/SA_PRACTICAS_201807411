apiVersion: apps/v1
kind: Deployment
metadata:
  name: processor-service
  namespace: practica9
spec:
  replicas: 1
  selector:
    matchLabels:
      app: processor-service
  template:
    metadata:
      labels:
        app: processor-service
    spec:
      containers:
        - name: processor-service
          image: us-central1-docker.pkg.dev/saproject201807411/delivereats/practica9-processor-service:latest
          imagePullPolicy: Always
          env:
            - name: PORT
              value: "3103"
            - name: EVENT_BUS_URL
              value: amqp://guest:guest@rabbitmq:5672
            - name: EVENT_EXCHANGE
              value: helpdesk.events
            - name: EVENT_QUEUE
              value: practica9.ticket.processor
            - name: EVENT_ROUTING_KEY
              value: ticket.created
          ports:
            - containerPort: 3103
---
apiVersion: v1
kind: Service
metadata:
  name: processor-service
  namespace: practica9
spec:
  selector:
    app: processor-service
  ports:
    - port: 3103
      targetPort: 3103
