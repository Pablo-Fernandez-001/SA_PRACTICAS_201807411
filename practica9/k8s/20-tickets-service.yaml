apiVersion: apps/v1
kind: Deployment
metadata:
  name: tickets-service
  namespace: practica9
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tickets-service
  template:
    metadata:
      labels:
        app: tickets-service
    spec:
      containers:
        - name: tickets-service
          image: ghcr.io/your-org/practica9-tickets-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "3102"
            - name: EVENT_BUS_URL
              value: amqp://guest:guest@rabbitmq:5672
            - name: EVENT_EXCHANGE
              value: helpdesk.events
          ports:
            - containerPort: 3102
---
apiVersion: v1
kind: Service
metadata:
  name: tickets-service
  namespace: practica9
spec:
  selector:
    app: tickets-service
  ports:
    - port: 3102
      targetPort: 3102
