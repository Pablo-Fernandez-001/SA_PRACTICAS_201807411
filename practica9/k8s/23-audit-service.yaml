apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-service
  namespace: practica9
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audit-service
  template:
    metadata:
      labels:
        app: audit-service
    spec:
      containers:
        - name: audit-service
          image: us-central1-docker.pkg.dev/saproject201807411/delivereats/p8-audit-service:latest
          imagePullPolicy: Always
          env:
            - name: PORT
              value: "3104"
            - name: EVENT_BUS_URL
              value: amqp://helpdesk:helpdesk123@rabbitmq:5672
          ports:
            - containerPort: 3104
---
apiVersion: v1
kind: Service
metadata:
  name: audit-service
  namespace: practica9
spec:
  selector:
    app: audit-service
  ports:
    - port: 80
      targetPort: 3104
