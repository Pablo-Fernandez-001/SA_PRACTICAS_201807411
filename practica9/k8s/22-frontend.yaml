apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: practica9
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: us-central1-docker.pkg.dev/saproject201807411/delivereats/practica9-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: practica9
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
