apiVersion: apps/v1
kind: Deployment
metadata:
  name: users-db
  namespace: practica9
spec:
  replicas: 1
  selector:
    matchLabels:
      app: users-db
  template:
    metadata:
      labels:
        app: users-db
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: password
            - name: MYSQL_DATABASE
              value: users_db
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: users-db-data
              mountPath: /var/lib/mysql
            - name: users-db-init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: users-db-data
          emptyDir: {}
        - name: users-db-init
          configMap:
            name: users-db-init
---
apiVersion: v1
kind: Service
metadata:
  name: users-db
  namespace: practica9
spec:
  selector:
    app: users-db
  ports:
    - port: 3306
      targetPort: 3306
---
