// protos/fx_service.proto — DeliverEats FX Service
syntax = "proto3";

package fx;

service FXService {
  // Obtener tasa de cambio entre dos monedas
  rpc GetExchangeRate (ExchangeRateRequest) returns (ExchangeRateResponse);
  // Obtener múltiples tasas desde una moneda base
  rpc GetMultipleRates (MultipleRatesRequest) returns (MultipleRatesResponse);
  // Convertir un monto de una moneda a otra
  rpc ConvertAmount (ConvertRequest) returns (ConvertResponse);
}

// Solicitud de tasa individual (ej: GTQ → USD)
message ExchangeRateRequest {
  string from_currency = 1;  // Ej: "GTQ"
  string to_currency = 2;    // Ej: "USD"
}

// Respuesta con tasa de cambio
message ExchangeRateResponse {
  string from_currency = 1;
  string to_currency = 2;
  double rate = 3;
  int64 timestamp = 4;
  bool from_cache = 5;
  bool is_fallback = 6;
}

// Solicitud de múltiples tasas
message MultipleRatesRequest {
  string base_currency = 1;              // Ej: "GTQ"
  repeated string target_currencies = 2;  // ["USD", "EUR", "MXN"]
}

// Respuesta con múltiples tasas
message MultipleRatesResponse {
  string base_currency = 1;
  map<string, double> rates = 2;  // {"USD": 0.128, "EUR": 0.118}
  int64 timestamp = 3;
  bool from_cache = 4;
}

// Solicitud de conversión
message ConvertRequest {
  string from_currency = 1;
  string to_currency = 2;
  double amount = 3;
}

// Respuesta de conversión
message ConvertResponse {
  string from_currency = 1;
  string to_currency = 2;
  double original_amount = 3;
  double converted_amount = 4;
  double rate = 5;
  int64 timestamp = 6;
  bool from_cache = 7;
  bool is_fallback = 8;
}
