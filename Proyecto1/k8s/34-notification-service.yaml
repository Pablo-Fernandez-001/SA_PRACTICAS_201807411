apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: delivereats
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: gcr.io/PROJECT_ID/notification-service:v1.1.0
        ports:
        - containerPort: 3005
          name: http
        imagePullPolicy: IfNotPresent
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: notification-service-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: notification-service-config
              key: PORT
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: notification-service-config
              key: LOG_LEVEL
        - name: SMTP_HOST
          valueFrom:
            configMapKeyRef:
              name: notification-service-config
              key: SMTP_HOST
        - name: SMTP_PORT
          valueFrom:
            configMapKeyRef:
              name: notification-service-config
              key: SMTP_PORT
        - name: SMTP_SECURE
          valueFrom:
            configMapKeyRef:
              name: notification-service-config
              key: SMTP_SECURE
        - name: SMTP_FROM
          valueFrom:
            configMapKeyRef:
              name: notification-service-config
              key: SMTP_FROM
        - name: SMTP_FROM_NAME
          valueFrom:
            configMapKeyRef:
              name: notification-service-config
              key: SMTP_FROM_NAME
        - name: SMTP_USER
          valueFrom:
            secretKeyRef:
              name: smtp-credentials
              key: SMTP_USER
        - name: SMTP_PASS
          valueFrom:
            secretKeyRef:
              name: smtp-credentials
              key: SMTP_PASS
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3005
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3005
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: delivereats
spec:
  selector:
    app: notification-service
  ports:
  - protocol: TCP
    port: 3005
    targetPort: 3005
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: notification-service-hpa
  namespace: delivereats
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: notification-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
