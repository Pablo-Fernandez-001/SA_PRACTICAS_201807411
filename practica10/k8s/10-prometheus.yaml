apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: users-service
        metrics_path: /metrics
        static_configs:
          - targets: ["users-service.practica9.svc.cluster.local:80"]

      - job_name: tickets-service
        metrics_path: /metrics
        static_configs:
          - targets: ["tickets-service.practica9.svc.cluster.local:80"]

      - job_name: assignments-service
        metrics_path: /metrics
        static_configs:
          - targets: ["assignments-service.practica9.svc.cluster.local:80"]

      - job_name: audit-service
        metrics_path: /metrics
        static_configs:
          - targets: ["audit-service.practica9.svc.cluster.local:80"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --web.external-url=/api/prometheus
            - --web.route-prefix=/api/prometheus
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-external
  namespace: monitoring
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 32090
