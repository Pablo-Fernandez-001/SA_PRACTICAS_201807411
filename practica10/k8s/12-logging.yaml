apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.15.1
          env:
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
          ports:
            - containerPort: 9200
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: monitoring
spec:
  selector:
    app: elasticsearch
  ports:
    - port: 9200
      targetPort: 9200
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kibana
  template:
    metadata:
      labels:
        app: kibana
    spec:
      containers:
        - name: kibana
          image: docker.elastic.co/kibana/kibana:8.15.1
          env:
            - name: ELASTICSEARCH_HOSTS
              value: http://elasticsearch.monitoring.svc.cluster.local:9200
            - name: SERVER_BASEPATH
              value: /api/kibana
            - name: SERVER_REWRITEBASEPATH
              value: "true"
          ports:
            - containerPort: 5601
---
apiVersion: v1
kind: Service
metadata:
  name: kibana
  namespace: monitoring
spec:
  selector:
    app: kibana
  ports:
    - port: 5601
      targetPort: 5601
---
apiVersion: v1
kind: Service
metadata:
  name: kibana-external
  namespace: monitoring
spec:
  type: NodePort
  selector:
    app: kibana
  ports:
    - port: 5601
      targetPort: 5601
      nodePort: 32601
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kibana-realtime-dashboard
  namespace: monitoring
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: setup-kibana-dashboard
          image: node:20-alpine
          command:
            - node
            - -e
            - |
              const kibanaUrl = "http://kibana.monitoring.svc.cluster.local:5601/api/kibana";
              const dataViewId = "microservices-logs";
              const dashboardId = "practica10-logs-overview";
              const indexRefName = "kibanaSavedObjectMeta.searchSourceJSON.index";
              const realtimeQuery = {
                query: "kubernetes.namespace_name: monitoring and kubernetes.container_name: (prometheus or grafana)",
                language: "kuery"
              };
              const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

              async function request(path, options = {}) {
                const response = await fetch(`${kibanaUrl}${path}`, {
                  ...options,
                  headers: {
                    "content-type": "application/json",
                    "kbn-xsrf": "true",
                    ...(options.headers || {})
                  }
                });
                const text = await response.text();
                if (!response.ok) {
                  const error = new Error(`${options.method || "GET"} ${path} -> ${response.status}: ${text}`);
                  error.status = response.status;
                  throw error;
                }
                return text ? JSON.parse(text) : {};
              }

              async function waitForKibana() {
                for (let attempt = 1; attempt <= 60; attempt += 1) {
                  try {
                    await request("/api/status");
                    console.log("Kibana is ready");
                    return;
                  } catch (error) {
                    console.log(`waiting for Kibana (${attempt}/60)`);
                    await sleep(5000);
                  }
                }
                throw new Error("Kibana did not become ready");
              }

              async function ensureDataView() {
                try {
                  await request(`/api/data_views/data_view/${dataViewId}`);
                  console.log(`Data view ${dataViewId} already exists`);
                } catch (error) {
                  if (error.status !== 404) throw error;
                  await request("/api/data_views/data_view", {
                    method: "POST",
                    body: JSON.stringify({
                      data_view: {
                        id: dataViewId,
                        title: "microservices-logs-*",
                        timeFieldName: "@timestamp"
                      }
                    })
                  });
                  console.log(`Data view ${dataViewId} created`);
                }
              }

              function searchSource(query = realtimeQuery) {
                return JSON.stringify({
                  query,
                  filter: [],
                  indexRefName
                });
              }

              function visualizationAttrs(title, type, visState, query) {
                return {
                  title,
                  description: "",
                  visState: JSON.stringify({
                    title,
                    type,
                    ...visState
                  }),
                  uiStateJSON: "{}",
                  kibanaSavedObjectMeta: {
                    searchSourceJSON: searchSource(query)
                  }
                };
              }

              const categoryAxis = {
                id: "CategoryAxis-1",
                type: "category",
                position: "bottom",
                show: true,
                style: {},
                scale: { type: "linear" },
                labels: { show: true, truncate: 100 },
                title: {}
              };
              const valueAxis = {
                id: "ValueAxis-1",
                name: "LeftAxis-1",
                type: "value",
                position: "left",
                show: true,
                style: {},
                scale: { type: "linear", mode: "normal" },
                labels: { show: true, rotate: 0, filter: false, truncate: 100 },
                title: { text: "Count" }
              };
              const histogramParams = {
                type: "histogram",
                grid: { categoryLines: false },
                categoryAxes: [categoryAxis],
                valueAxes: [valueAxis],
                seriesParams: [{
                  show: true,
                  type: "histogram",
                  mode: "normal",
                  data: { label: "Count", id: "1" },
                  valueAxis: "ValueAxis-1",
                  drawLinesBetweenPoints: true,
                  showCircles: true
                }],
                addTooltip: true,
                addLegend: true,
                legendPosition: "right",
                times: [],
                addTimeMarker: false
              };

              const visualizations = [
                {
                  id: "practica10-logs-over-time",
                  attrs: visualizationAttrs("Prometheus/Grafana logs por minuto", "histogram", {
                    params: histogramParams,
                    aggs: [
                      { id: "1", enabled: true, type: "count", schema: "metric", params: {} },
                      {
                        id: "2",
                        enabled: true,
                        type: "date_histogram",
                        schema: "segment",
                        params: {
                          field: "@timestamp",
                          timeRange: { from: "now-5m", to: "now" },
                          useNormalizedEsInterval: true,
                          scaleMetricValues: false,
                          interval: "auto",
                          drop_partials: false,
                          min_doc_count: 1,
                          extended_bounds: {}
                        }
                      }
                    ]
                  })
                },
                {
                  id: "practica10-logs-by-service",
                  attrs: visualizationAttrs("Logs por componente", "histogram", {
                    params: histogramParams,
                    aggs: [
                      { id: "1", enabled: true, type: "count", schema: "metric", params: {} },
                      {
                        id: "2",
                        enabled: true,
                        type: "terms",
                        schema: "segment",
                        params: {
                          field: "kubernetes.container_name.keyword",
                          orderBy: "1",
                          order: "desc",
                          size: 10,
                          otherBucket: false,
                          missingBucket: false
                        }
                      }
                    ]
                  })
                },
                {
                  id: "practica10-logs-by-namespace",
                  attrs: visualizationAttrs("Logs por namespace", "pie", {
                    params: {
                      type: "pie",
                      addTooltip: true,
                      addLegend: true,
                      legendPosition: "right",
                      isDonut: true,
                      labels: { show: false }
                    },
                    aggs: [
                      { id: "1", enabled: true, type: "count", schema: "metric", params: {} },
                      {
                        id: "2",
                        enabled: true,
                        type: "terms",
                        schema: "segment",
                        params: {
                          field: "kubernetes.container_name.keyword",
                          orderBy: "1",
                          order: "desc",
                          size: 8,
                          otherBucket: false,
                          missingBucket: false
                        }
                      }
                    ]
                  })
                },
                {
                  id: "practica10-error-warning-logs",
                  attrs: visualizationAttrs("Errores y warnings Prometheus/Grafana", "metric", {
                    params: {
                      addTooltip: true,
                      addLegend: false,
                      type: "metric",
                      metric: {
                        percentageMode: false,
                        useRanges: false,
                        colorSchema: "Red to Green",
                        metricColorMode: "None",
                        colorsRange: [{ from: 0, to: 10000 }],
                        labels: { show: true },
                        invertColors: false,
                        style: {
                          bgFill: "#000",
                          bgColor: false,
                          labelColor: false,
                          subText: "",
                          fontSize: 60
                        }
                      }
                    },
                    aggs: [
                      { id: "1", enabled: true, type: "count", schema: "metric", params: {} }
                    ]
                  }, {
                    query: "kubernetes.namespace_name: monitoring and kubernetes.container_name: (prometheus or grafana) and (stream:stderr or log_level:error or log_level:warn or message:*error* or message:*warn*)",
                    language: "kuery"
                  })
                }
              ];

              async function saveVisualization({ id, attrs }) {
                await request(`/api/saved_objects/visualization/${id}?overwrite=true`, {
                  method: "POST",
                  body: JSON.stringify({
                    attributes: attrs,
                    references: [{ name: indexRefName, type: "index-pattern", id: dataViewId }]
                  })
                });
                console.log(`Visualization ${id} saved`);
              }

              async function saveDashboard() {
                const panelIds = visualizations.map((item) => item.id);
                const panels = panelIds.map((id, index) => ({
                  version: "8.15.1",
                  type: "visualization",
                  gridData: {
                    x: index % 2 === 0 ? 0 : 24,
                    y: index < 2 ? 0 : 15,
                    w: 24,
                    h: 15,
                    i: `${index + 1}`
                  },
                  panelIndex: `${index + 1}`,
                  embeddableConfig: {},
                  panelRefName: `panel_${index}`
                }));
                await request(`/api/saved_objects/dashboard/${dashboardId}?overwrite=true`, {
                  method: "POST",
                  body: JSON.stringify({
                    attributes: {
                      title: "Practica10 - Logs Overview",
                      description: "Graficos real-time de logs reales de Prometheus y Grafana recolectados por Fluent Bit hacia Elasticsearch.",
                      hits: 0,
                      panelsJSON: JSON.stringify(panels),
                      optionsJSON: JSON.stringify({ useMargins: true, syncColors: false, hidePanelTitles: false }),
                      version: 1,
                      timeRestore: true,
                      timeFrom: "now-5m",
                      timeTo: "now",
                      refreshInterval: { pause: false, value: 5000 },
                      kibanaSavedObjectMeta: {
                        searchSourceJSON: JSON.stringify({
                          query: realtimeQuery,
                          filter: []
                        })
                      }
                    },
                    references: panelIds.map((id, index) => ({
                      name: `panel_${index}`,
                      type: "visualization",
                      id
                    }))
                  })
                });
                console.log(`Dashboard ${dashboardId} saved`);
              }

              async function configureDefaults() {
                await request("/api/kibana/settings/defaultIndex", {
                  method: "POST",
                  body: JSON.stringify({ value: dataViewId })
                });
                await request("/api/kibana/settings/defaultRoute", {
                  method: "POST",
                  body: JSON.stringify({ value: `/app/dashboards#/view/${dashboardId}` })
                });
                console.log("Kibana defaults configured");
              }

              await waitForKibana();
              await ensureDataView();
              for (const visualization of visualizations) {
                await saveVisualization(visualization);
              }
              await saveDashboard();
              await configureDefaults();
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluent-bit-read
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluent-bit-read-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fluent-bit-read
subjects:
  - kind: ServiceAccount
    name: fluent-bit
    namespace: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: monitoring
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush        1
        Daemon       Off
        Log_Level    info
        Parsers_File parsers.conf

    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        Parser            cri
        Tag               kube.*
        Refresh_Interval  5
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On

    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Keep_Log            Off

    [OUTPUT]
        Name                es
        Match               kube.*
        Host                elasticsearch.monitoring.svc.cluster.local
        Port                9200
        Logstash_Format     On
        Logstash_Prefix     microservices-logs
        Suppress_Type_Name  On
        Replace_Dots        On
  parsers.conf: |
    [PARSER]
        Name        cri
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
    spec:
      serviceAccountName: fluent-bit
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:3.1
          volumeMounts:
            - name: varlog
              mountPath: /var/log
            - name: config
              mountPath: /fluent-bit/etc/fluent-bit.conf
              subPath: fluent-bit.conf
            - name: config
              mountPath: /fluent-bit/etc/parsers.conf
              subPath: parsers.conf
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: config
          configMap:
            name: fluent-bit-config
