apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: redpandadata/redpanda:v24.1.13
          command:
            - /bin/bash
            - -ec
            - |
              rpk redpanda start \
                --overprovisioned \
                --smp 1 \
                --memory 512M \
                --reserve-memory 0M \
                --node-id 0 \
                --kafka-addr PLAINTEXT://0.0.0.0:9092 \
                --advertise-kafka-addr PLAINTEXT://kafka.monitoring.svc.cluster.local:9092
          ports:
            - containerPort: 9092
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: monitoring
spec:
  selector:
    app: kafka
  ports:
    - name: broker
      port: 9092
      targetPort: 9092
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-demo-producer
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-demo-producer
  template:
    metadata:
      labels:
        app: kafka-demo-producer
    spec:
      containers:
        - name: producer
          image: redpandadata/redpanda:v24.1.13
          command:
            - /bin/bash
            - -ec
            - |
              # Envia eventos periodicos para validar Kafka UI sin pasos manuales.
              rpk topic create practica10-events --brokers kafka.monitoring.svc.cluster.local:9092 || true
              while true; do
                TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                echo "{\"event\":\"heartbeat\",\"source\":\"kafka-demo-producer\",\"timestamp\":\"${TS}\"}" | rpk topic produce practica10-events --brokers kafka.monitoring.svc.cluster.local:9092 >/dev/null
                sleep 5
              done
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui
  namespace: monitoring
spec:
  selector:
    app: kafka-ui
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-ui
  template:
    metadata:
      labels:
        app: kafka-ui
    spec:
      containers:
        - name: kafka-ui
          image: provectuslabs/kafka-ui:v0.7.2
          env:
            - name: DYNAMIC_CONFIG_ENABLED
              value: "false"
            - name: SERVER_SERVLET_CONTEXT_PATH
              value: /api/kafka
            - name: KAFKA_CLUSTERS_0_NAME
              value: monitoring-kafka
            - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
              value: kafka.monitoring.svc.cluster.local:9092
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui-external
  namespace: monitoring
spec:
  type: NodePort
  selector:
    app: kafka-ui
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30880
