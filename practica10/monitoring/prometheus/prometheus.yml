global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: tickets-service
    metrics_path: /metrics
    static_configs:
      - targets: ["tickets-service.practica9.svc.cluster.local:3102"]

  - job_name: processor-service
    metrics_path: /metrics
    static_configs:
      - targets: ["processor-service.practica9.svc.cluster.local:3103"]

  - job_name: kube-state-metrics
    static_configs:
      - targets: ["kube-state-metrics.kube-system.svc.cluster.local:8080"]
