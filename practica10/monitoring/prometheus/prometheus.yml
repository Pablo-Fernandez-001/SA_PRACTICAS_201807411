global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    metrics_path: /api/prometheus/metrics
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: users-service
    metrics_path: /metrics
    static_configs:
      - targets: ["users-service.practica9.svc.cluster.local:80"]

  - job_name: tickets-service
    metrics_path: /metrics
    static_configs:
      - targets: ["tickets-service.practica9.svc.cluster.local:80"]

  - job_name: assignments-service
    metrics_path: /metrics
    static_configs:
      - targets: ["assignments-service.practica9.svc.cluster.local:80"]

  - job_name: audit-service
    metrics_path: /metrics
    static_configs:
      - targets: ["audit-service.practica9.svc.cluster.local:80"]

  - job_name: kube-state-metrics
    static_configs:
      - targets: ["kube-state-metrics.kube-system.svc.cluster.local:8080"]
