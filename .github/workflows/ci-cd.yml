name: ci-cd

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: saproject201807411
  PROJECT_NUMBER: "1014199069115"
  REGION: us-central1
  ZONE: us-central1-a
  VM_NAME: delivereats-k3s-1
  ARTIFACT_REPOSITORY: delivereats
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  WORKLOAD_IDENTITY_PROVIDER: projects/1014199069115/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  SERVICE_ACCOUNT: github-deployer@saproject201807411.iam.gserviceaccount.com

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - proyecto8/users-service
          - proyecto8/tickets-service
          - proyecto8/assignments-service
          - proyecto8/audit-service
          - proyecto8/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm install

      - name: Lint
        working-directory: ${{ matrix.service }}
        run: npm run lint --if-present

      - name: Test
        working-directory: ${{ matrix.service }}
        run: npm run test --if-present

  build-images:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: lint-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: p8-users-service
            context: proyecto8/users-service
          - name: p8-tickets-service
            context: proyecto8/tickets-service
          - name: p8-assignments-service
            context: proyecto8/assignments-service
          - name: p8-audit-service
            context: proyecto8/audit-service
          - name: p8-frontend
            context: proyecto8/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Build and push image with Cloud Build
        run: |
          gcloud --version
          gcloud builds submit "${{ matrix.context }}" \
            --project="$PROJECT_ID" \
            --region="$REGION" \
            --default-buckets-behavior=regional-user-owned-bucket \
            --service-account="projects/$PROJECT_ID/serviceAccounts/$SERVICE_ACCOUNT" \
            --tag "us-central1-docker.pkg.dev/$PROJECT_ID/$ARTIFACT_REPOSITORY/${{ matrix.name }}:latest"

  deploy-k3s:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Deploy to K3s
        run: |
          set -euo pipefail
          export VM_IP=$(gcloud compute instances describe "$VM_NAME" --project "$PROJECT_ID" --zone "$ZONE" --format='get(networkInterfaces[0].accessConfigs[0].natIP)')
          gcloud compute ssh "$VM_NAME" --project "$PROJECT_ID" --zone "$ZONE" --quiet \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --ssh-flag="-o UserKnownHostsFile=/dev/null" \
            --command "sudo cat /etc/rancher/k3s/k3s.yaml" > k3s.yaml
          python3 - <<'PY'
          from pathlib import Path
          import os
          path = Path('k3s.yaml')
          data = path.read_text()
          path.write_text(data.replace('127.0.0.1', os.environ['VM_IP']))
          PY
          export KUBECONFIG="$PWD/k3s.yaml"
          kubectl apply -f practica9/k8s/00-namespace.yaml
          kubectl apply -f practica9/k8s/10-rabbitmq.yaml
          kubectl apply -f practica9/k8s/11-db-init-configmaps.yaml
          kubectl apply -f practica9/k8s/12-databases.yaml
          kubectl apply -f practica9/k8s/20-tickets-service.yaml
          kubectl apply -f practica9/k8s/21-processor-service.yaml
          kubectl apply -f practica9/k8s/22-frontend.yaml
          kubectl apply -f practica9/k8s/23-audit-service.yaml
          kubectl apply -f practica9/k8s/24-frontend.yaml
          kubectl apply -f practica9/k8s/30-ingress.yaml
          kubectl apply -f practica10/k8s/00-namespace.yaml
          kubectl apply -f practica10/k8s/10-prometheus.yaml
          kubectl apply -f practica10/k8s/11-grafana.yaml
          kubectl apply -f practica10/k8s/12-logging.yaml
          kubectl apply -f practica10/k8s/30-monitoring-ingress.yaml
          kubectl -n practica9 rollout status deploy/rabbitmq --timeout=240s
          kubectl -n practica9 rollout status deploy/users-db --timeout=240s
          kubectl -n practica9 rollout status deploy/tickets-db --timeout=240s
          kubectl -n practica9 rollout status deploy/assignments-db --timeout=240s
          kubectl -n practica9 rollout status deploy/users-service --timeout=240s
          kubectl -n practica9 rollout status deploy/tickets-service --timeout=240s
          kubectl -n practica9 rollout status deploy/assignments-service --timeout=240s
          kubectl -n practica9 rollout status deploy/audit-service --timeout=240s
          kubectl -n practica9 rollout status deploy/frontend --timeout=240s
          kubectl -n monitoring rollout status deploy/prometheus --timeout=240s
          kubectl -n monitoring rollout status deploy/grafana --timeout=240s
          kubectl -n monitoring rollout status deploy/elasticsearch --timeout=240s
          kubectl -n monitoring rollout status deploy/kibana --timeout=240s
